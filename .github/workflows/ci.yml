name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── LINT ──────────────────────────────────────────────────────────────────

  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint deps
        run: pip install ruff mypy -r requirements.txt

      - name: ruff check
        run: ruff check app/ tests/

      - name: ruff format check
        run: ruff format --check app/ tests/

      - name: mypy
        run: mypy app/ --ignore-missing-imports

  # ─── TEST ──────────────────────────────────────────────────────────────────

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ─── BUILD ─────────────────────────────────────────────────────────────────

  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── PUSH ──────────────────────────────────────────────────────────────────

  push:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── DEPLOY ────────────────────────────────────────────────────────────────

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /root/live-cicd-lab

            # Update deploy metadata in .env
            sed -i "s|^LAST_DEPLOY=.*|LAST_DEPLOY=$(date '+%Y-%m-%d %H:%M')|" .env
            sed -i "s|^CURRENT_IMAGE=.*|CURRENT_IMAGE=ghcr.io/${{ github.repository }}:${{ github.sha }}|" .env
            sed -i "s|^GIT_SHA=.*|GIT_SHA=${{ github.sha }}|" .env

            # Pull new image and redeploy app container only
            APP_IMAGE=ghcr.io/${{ github.repository }}:${{ github.sha }} \
              docker compose pull app
            APP_IMAGE=ghcr.io/${{ github.repository }}:${{ github.sha }} \
              docker compose up -d --no-deps app

  # ─── RESTART ───────────────────────────────────────────────────────────────

  restart:
    name: Restart app container
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Restart via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /root/live-cicd-lab
            docker compose restart app
